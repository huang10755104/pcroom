- hosts: all
  gather_facts: yes
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
  tasks:
    - name: Stop Chrome URL lockdown
      ansible.windows.win_shell: reg delete "HKLM\SOFTWARE\Policies\Google\Chrome\URLBlocklist" /f
    - name: Remove Chrome URL allowlist
      ansible.windows.win_shell: reg delete "HKLM\SOFTWARE\Policies\Google\Chrome\URLAllowlist" /f